name: "⚙ Tarefa Técnica"
description: "Trabalho técnico, como refatoração, melhorias de desempenho ou mudanças arquiteturais"
title: "[TASK] "
labels: ["task"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## ⚙ Tarefa Técnica

        Use este template para registrar **trabalho técnico** relacionado a melhorias internas no projeto.

        Exemplos incluem:
        - Refatoração de código
        - Otimização de desempenho
        - Organização da base de código
        - Melhorias de arquitetura
        - Mudanças de infraestrutura
        - Atualização de dependências

        Essas tarefas geralmente **não introduzem novas funcionalidades**, mas melhoram a manutenibilidade, estabilidade ou escalabilidade.

  - type: textarea
    id: context
    attributes:
      label: 📌 Contexto
      description: Descreva a necessidade técnica ou o problema que motiva esta tarefa.
      placeholder: |
        Exemplo:
        O módulo de autenticação cresceu significativamente e agora contém lógica duplicada,
        tornando-o mais difícil de manter e testar.
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: 🎯 Objectivo
      description: Explique claramente o que deve ser alcançado após a conclusão desta tarefa.
      placeholder: |
        Exemplo:
        Refatorar o módulo de autenticação para separar responsabilidades e melhorar a legibilidade do código.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 📦 Escopo
      description: Liste as principais atividades técnicas incluídas nesta tarefa.
      placeholder: |
        Exemplo:
        - Extrair lógica de autenticação em serviços dedicados
        - Remover código duplicado
        - Melhorar a estrutura de pastas
        - Atualizar testes relacionados

  - type: textarea
    id: technical_requirements
    attributes:
      label: ⚙ Requisitos Técnicos
      description: Liste tecnologias, dependências ou restrições envolvidas nesta tarefa.
      placeholder: |
        Exemplo:
        - Atualizar dependências para as versões estáveis mais recentes
        - Manter compatibilidade com a API atual
        - Seguir as diretrizes de arquitetura do projeto

  - type: textarea
    id: impact
    attributes:
      label: 🔍 Impacto
      description: Descreva como esta tarefa pode afetar o sistema.
      placeholder: |
        Exemplo:
        - Melhora a manutenibilidade
        - Reduz o débito técnico
        - Melhora o desempenho nos fluxos de autenticação

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: ✔ Critérios de Aceitação
      description: Condições necessárias para considerar esta tarefa como concluída.
      options:
        - label: Implementação concluída de acordo com o escopo
        - label: Código revisado e aprovado
        - label: Alterações testadas em ambiente de desenvolvimento
        - label: O código segue os padrões e convenções do projeto
        - label: Testes relacionados atualizados ou adicionados, se necessário