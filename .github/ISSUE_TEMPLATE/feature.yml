name: "✨ Solicitar Funcionalidade"
description: "Sugira uma nova funcionalidade ou melhoria para o projeto"
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Solicitar Funcionalidade

        Obrigado por sugerir uma nova funcionalidade!

        As solicitações de funcionalidades ajudam a melhorar o projeto e torná-lo mais útil para todos.

        **Antes de enviar**
        - Verifique se já existe uma solicitação de funcionalidade semelhante
        - Forneça detalhes claros sobre o problema e a solução proposta
        - Inclua exemplos ou referências sempre que possível

  - type: textarea
    id: context
    attributes:
      label: 📌 Contexto
      description: Descreva o problema ou a oportunidade que motivou esta solicitação de funcionalidade.
      placeholder: |
        Exemplo:
        Atualmente, os usuários não conseguem exportar relatórios como arquivos CSV, o que dificulta a análise de dados fora do aplicativo.
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: 🎯 Objectivo
      description: Explique claramente o que deve ser implementado.
      placeholder: |
        Exemplo:
        Adicionar uma opção para exportar relatórios como arquivos CSV ou Excel diretamente do painel de controle (dashboard).
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 📦 Escopo
      description: Liste as principais funcionalidades ou partes incluídas nesta funcionalidade.
      placeholder: |
        Exemplo:
        - Adicionar botão de exportação na página de relatório
        - Gerar arquivo CSV a partir dos dados do relatório
        - Permitir formato de exportação Excel
        - Adicionar notificação de download

  - type: textarea
    id: technical_requirements
    attributes:
      label: ⚙ Requisitos Técnicos
      description: Liste requisitos técnicos, dependências ou detalhes de implementação.
      placeholder: |
        Exemplo:
        - Integração com a API de relatórios
        - Uso de serviço backend para gerar arquivos
        - Atualizar a interface do frontend para incluir opções de exportação
        - Garantir compatibilidade com os filtros de relatório existentes

  - type: textarea
    id: references
    attributes:
      label: 🔗 Referências
      description: Adicione links para issues relacionadas, documentação, designs ou exemplos externos.
      placeholder: |
        Exemplo:
        - Issue relacionada: #42
        - Mockup de design: https://figma.com/exemplo
        - Funcionalidade semelhante: https://exemplo.com/docs/export

  - type: textarea
    id: value
    attributes:
      label: 💡 Valor / Impacto
      description: Explique como essa funcionalidade beneficiará os usuários ou o projeto.
      placeholder: |
        Exemplo:
        Esta funcionalidade permitirá que os usuários analisem dados em ferramentas externas, como Excel ou plataformas de BI.

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: ✔ Critérios de Aceitação
      description: Condições necessárias para considerar esta funcionalidade como concluída.
      options:
        - label: Funcionalidade implementada de acordo com o escopo descrito
        - label: Implementação testada em ambiente de desenvolvimento
        - label: Nenhuma regressão foi introduzida
        - label: Documentação atualizada, se necessário