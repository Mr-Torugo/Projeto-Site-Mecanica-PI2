name: "📚 Documentação"
description: "Crie, melhore ou atualize a documentação do projeto"
title: "[DOCS] "
labels: ["Documentação"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 📚 Request de Documentação

        Use este template para solicitar **nova documentação** ou **atualizações em documentações existentes**.

        Uma boa documentação ajuda usuários e contribuidores a entenderem como o projeto funciona.

        **Dicas**
        - Seja claro sobre o que precisa ser documentado
        - Inclua exemplos, se possível
        - Adicione links para funcionalidades ou issues relacionadas

  - type: textarea
    id: context
    attributes:
      label: 📌 Contexto
      description: Descreva a situação que exige documentação.
      placeholder: |
        Exemplo:
        Um novo sistema de autenticação foi adicionado, mas não há documentação explicando como configurá-lo.
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: 🎯 Objetivo
      description: Explique claramente o que a documentação deve cobrir.
      placeholder: |
        Exemplo:
        Criar um guia explicando como configurar a autenticação usando variáveis de ambiente.
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: 📦 Escopo
      description: Selecione o tipo de documentação que deve ser criada ou atualizada.
      options:
        - label: Guia do usuário / instruções de uso
        - label: Explicação técnica
        - label: Atualização do README
        - label: Exemplos de código
        - label: Documentação de API
        - label: Guia de instalação ou configuração

  - type: textarea
    id: documentation_location
    attributes:
      label: 📍 Localização da Documentação
      description: Onde esta documentação deve residir?
      placeholder: |
        Exemplo:
        - README.md
        - Wiki do Projeto
        - Pasta /docs
        - Portal de documentação interna
        - Seção de referência da API

  - type: textarea
    id: references
    attributes:
      label: 🔗 Referencias
      description: Forneça links para issues relacionadas, funcionalidades ou documentações externas.
      placeholder: |
        Exemplo:
        - Issue relacionada: #123
        - Documentação da API: https://exemplo.com/api
        - Implementação semelhante: https://docs.exemplo.com/auth

  - type: textarea
    id: additional_context
    attributes:
      label: 🧩 Contexto Adicional
      description: Quaisquer detalhes extras que possam ajudar a criar a documentação.
      placeholder: |
        Exemplo:
        A documentação deve incluir exemplos usando tanto REST quanto CLI.

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: ✔ Critérios de Aceitação 
      description: Condições necessárias para considerar esta documentação como concluída.
      options:
        - label: Documentação criada ou atualizada
        - label: Conteúdo revisado para clareza e precisão
        - label: Documentação acessível para a equipe ou usuários
        - label: Exemplos ou instruções de uso incluídos